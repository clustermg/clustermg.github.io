<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/x-icon"
      href="static/img/ahi_fav_grey.png"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Poppins: ital, wght@0,100; 0,200; 0,300; 0,400; 0,500; 0,600; 0,700;0,800;0,900;1,100;1,200; 1,300; 1,400;1,500; 1,600;1,700;1,800; 1,900&display=swap"
      rel="stylesheet"
    />
    <title>AHI | Cluster MG - BHZ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(rgb(26, 36, 54), rgba(39, 48, 65, 0.153)), url('static/img/background.png');
            background-repeat: no-repeat;
            background-size: cover;
            color: #b0b1b3;
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0 20px;
        }

        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            margin-bottom: 100px;
            border-bottom: 2px solid #b0b1b3;
        }

        header img {
            width: 250px;
            height: auto;
        }
        header p {
            font-size: 16px;
            color: #b0b1b3;
        }

        header .data-hora {
            font-size: 16px;
            color: #b0b1b3;
        }

        .container {
            background-color: rgb(255, 255, 255);
            backdrop-filter: blur(5px);
            padding: 50px;
            border-radius: 18px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            bottom: 30px;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            color: rgb(78, 125, 150);
            margin-bottom: 20px;
            font-weight: 800;
            font-size: 40px;
        }

        input, button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border-radius: 25px;
            border: 1px solid #b0b1b3;
            margin-bottom: 15px;
            color: #333;
        }
        input {
            border-radius: 15px;
        }

        input[type="file"] {
            padding: 10px;
        }

        button {
            background-color: #1c2c44;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            border-radius: 25px;
            transition: .5s;
        }

        button:hover {
            background-color: #f47839;
            box-shadow: 0 0 10px rgba(22, 81, 153, 0.5);
        }

        footer {
            text-align: center;
            margin-top: auto;
            padding: 20px;
            color: #b0b1b3;
            font-size: 14px;
        }

        footer a {
            color: #00b5e2;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
  </head>
  <body>
    <header>
      <img src="static/img/logo_ahi_.png" alt="Logo AHI" />
      <div>
        <h3>Olá! Seja bem-vindo(a)!</h3>
        <br />
        <p class="data-hora" id="dataHora"></p>
      </div>
    </header>

    <div class="container">
      <h1>Fechamento Mensal</h1>
      <input type="text" id="nome" placeholder="Nome" />
      <input type="text" id="cargo" placeholder="Cargo" />
      <input type="text" id="hotel" placeholder="Hotel" />
      <input type="file" id="arquivoExcel" accept=".xlsx" />
      <button onclick="processarArquivo()">Gerar Relatório</button>
    </div>

    <footer>
      <p>&copy; 2025 AHI | Cluster MG - BHZ. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@7.2.0/build/index.min.js"></script>
    <script>
      function updateDataHora() {
        const data = new Date();
        const options = {
          weekday: "long",
          day: "numeric",
          month: "long",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        };
        const dataHoraFormatada = data.toLocaleString("pt-BR", options);
        document.getElementById("dataHora").textContent = dataHoraFormatada;
      }

      setInterval(updateDataHora, 1000);

      function processarArquivo() {
        const fileInput = document.getElementById("arquivoExcel").files[0];
        const reader = new FileReader();
        reader.onload = function (event) {
          const data = new Uint8Array(event.target.result);
          const workbook = XLSX.read(data, { type: "array" });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const jsonData = XLSX.utils.sheet_to_json(sheet);

          const nome = document.getElementById("nome").value;
          const cargo = document.getElementById("cargo").value;
          const hotel = document.getElementById("hotel").value;
          const dataAtual = new Date().toLocaleDateString("pt-BR", {
            day: "2-digit",
            month: "long",
            year: "numeric",
          });

          const dadosFiltrados = jsonData.filter(
            (item) => item[Object.keys(item)[6]] === hotel
          );
          gerarDocumento(nome, cargo, hotel, dataAtual, dadosFiltrados);
        };
        reader.readAsArrayBuffer(fileInput);
      }

      function gerarDocumento(nome, cargo, hotel, dataAtual, dados) {
        const { Document, Packer, Paragraph, TextRun, Header, Footer, ImageRun } = window.docx;

        // Function to convert image to base64
        function getBase64Logo() {
            return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                const dataURL = canvas.toDataURL('image/png');
                resolve(dataURL.split(',')[1]); // Remove the data URL prefix
            };
            img.onerror = reject;
            img.src = 'static/img/logo_ahi_.png';
            });
        }

        // Modify the document generation to be an async function
        async function createDocument() {
            let logoBase64;
            try {
            logoBase64 = await getBase64Logo();
            } catch (error) {
            console.error('Error loading logo:', error);
            logoBase64 = null;
            }

            const doc = new Document({
            styles: {
                default: {
                run: {
                    font: "Arial"
                }
                }
            },
            sections: [
                {
                headers: {
                    default: new Header({
                    children: logoBase64 
                        ? [
                            new Paragraph({
                            children: [
                                new ImageRun({
                                data: Uint8Array.from(atob(logoBase64), c => c.charCodeAt(0)),
                                transformation: {
                                    width: 190,
                                    height: 50
                                }
                                })
                            ]
                            }),
                            // Add a blank paragraph for spacing
                            new Paragraph({ text: "" }),
                            new Paragraph({ text: "" })
                        ]
                        : [
                            new Paragraph({
                            children: [
                                new TextRun({
                                text: "AHI",
                                bold: true,
                                font: "Arial"
                                })
                            ]
                            })
                        ]
                    })
                },
                footers: {
                    default: new Footer({
                    children: [
                        new Paragraph({
                        children: [
                            new TextRun({
                            text: "____________________________________________________",
                            color: "808080",
                            font: "Arial"
                            })
                        ]
                        })
                    ]
                    })
                },
                children: [
                    new Paragraph({
                    children: [
                        new TextRun({
                        text: "Nome: ",
                        bold: true,
                        font: "Arial"
                        }),
                        new TextRun({
                        text: nome,
                        font: "Arial"
                        }),
                    ],
                    }),
                    new Paragraph({
                    children: [
                        new TextRun({
                        text: "Cargo: ",
                        bold: true,
                        font: "Arial"
                        }),
                        new TextRun({
                        text: cargo,
                        font: "Arial"
                        }),
                    ],
                    }),
                    new Paragraph({
                    children: [
                        new TextRun({
                        text: "Hotel: ",
                        bold: true,
                        font: "Arial"
                        }),
                        new TextRun({
                        text: hotel,
                        font: "Arial"
                        }),
                    ],
                    }),
                    new Paragraph({
                    children: [
                        new TextRun({
                        text: "Data: ",
                        bold: true,
                        font: "Arial"
                        }),
                        new TextRun({
                        text: dataAtual,
                        font: "Arial"
                        }),
                    ],
                    }),
                    
                    // Added blank paragraph for spacing
                    new Paragraph({ text: "" }),

                    new Paragraph({
                    children: [
                        new TextRun({
                        text: "FECHAMENTO MENSAL",
                        font: "Arial",
                        bold: true
                        })
                    ],
                    heading: "Heading1",
                    }),
                    
                    // Added blank paragraph for spacing
                    new Paragraph({ text: "" }),

                    new Paragraph({
                    children: [
                        new TextRun({
                        text: "Prezados, as atividades com maior relevância no mês, destacam-se:",
                        font: "Arial"
                        })
                    ],
                    }),
                    // Added blank paragraph for spacing
                    new Paragraph({ text: "" }),

                    // Adicionar cada atividade de forma legível
                    ...dados.map((dado) => {
                    return [
                        new Paragraph({
                        children: [
                            new TextRun({
                            text: "Tipo: ",
                            bold: true,
                            font: "Arial"
                            }),
                            new TextRun({
                            text: dado[Object.keys(dado)[0]],
                            font: "Arial"
                            }),
                        ],
                        }),
                        new Paragraph({
                        children: [
                            new TextRun({
                            text: "Assunto: ",
                            bold: true,
                            font: "Arial"
                            }),
                            new TextRun({
                            text: dado[Object.keys(dado)[1]],
                            font: "Arial"
                            }),
                        ],
                        }),
                        new Paragraph({
                        children: [
                            new TextRun({
                            text: "Conta Relacionada: ",
                            bold: true,
                            font: "Arial"
                            }),
                            new TextRun({
                            text: dado[Object.keys(dado)[2]],
                            font: "Arial"
                            }),
                        ],
                        }),
                        new Paragraph({
                        children: [
                            new TextRun({
                            text: "Início: ",
                            bold: true,
                            font: "Arial"
                            }),
                            new TextRun({
                            text: dado[Object.keys(dado)[4]],
                            font: "Arial"
                            }),
                        ],
                        }),
                        new Paragraph({
                        children: [
                            new TextRun({
                            text: "Término: ",
                            bold: true,
                            font: "Arial"
                            }),
                            new TextRun({
                            text: dado[Object.keys(dado)[5]],
                            font: "Arial"
                            }),
                        ],
                        }),
                        new Paragraph({
                        children: [
                            new TextRun({
                            text: "Descrição: ",
                            bold: true,
                            font: "Arial"
                            }),
                            new TextRun({
                            text: dado[Object.keys(dado)[3]],
                            font: "Arial"
                            }),
                        ],
                        }),
                        new Paragraph({ text: "" }) // Add a blank line between entries
                    ];
                    }).flat(), // Flatten the nested arrays
                ],
                },
            ],
            });

            return doc;
        }

        // Modify the function to use async/await
        async function generateDocument() {
            try {
            const doc = await createDocument();
            
            Packer.toBlob(doc)
                .then((blob) => {
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `${hotel}_Fechamento_Mensal.docx`;
                link.click();
                })
                .catch((error) => {
                console.error("Erro ao gerar o arquivo .docx:", error);
                });
            } catch (error) {
            console.error("Erro ao criar o documento:", error);
            }
        }

        // Call the new async function
        generateDocument();
        }

    </script>
  </body>
</html>
