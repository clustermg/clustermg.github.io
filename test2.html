<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="static/img/ahi_fav_grey.png">
    <title>AHI | Cluster MG - BHZ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(rgb(39, 48, 65), rgba(39, 48, 65, 0.419)), url('static/img/background.png');
            background-repeat: no-repeat;
            background-size: cover;
            color: #b0b1b3;
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0 20px;
        }

        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            margin-bottom: 100px;
            border-bottom: 2px solid #b0b1b3;
        }

        header img {
            width: 250px;
            height: auto;
        }
        header p {
            font-size: 16px;
            color: #b0b1b3;
        }

        header .data-hora {
            font-size: 16px;
            color: #b0b1b3;
        }

        .container {
            background-color: rgb(255, 255, 255);
            backdrop-filter: blur(5px);
            padding: 50px;
            border-radius: 18px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            bottom: 30px;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            color: rgb(78, 125, 150);
            margin-bottom: 20px;
            font-weight: 800;
            font-size: 40px;
        }

        input, button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border-radius: 25px;
            border: 1px solid #b0b1b3;
            margin-bottom: 15px;
            color: #333;
        }
        input {
            border-radius: 15px;
        }

        input[type="file"] {
            padding: 10px;
        }

        button {
            background-color: #1c2c44;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            border-radius: 25px;
            transition: .4s;
        }

        button:hover {
            background-color: #234271;
            box-shadow: 0 0 10px rgba(22, 81, 153, 0.5);
        }

        footer {
            text-align: center;
            margin-top: auto;
            padding: 20px;
            color: #b0b1b3;
            font-size: 14px;
        }

        footer a {
            color: #00b5e2;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <img src="static/img/logo_ahi_.png" alt="Logo AHI">
        <div><h3>Olá! Seja bem-vindo(a)!</h3><br><p class="data-hora" id="dataHora"></p></div>
    </header>

    <div class="container">
        <h1>Fechamento Mensal</h1>
        <input type="text" id="nome" placeholder="Nome">
        <input type="text" id="cargo" placeholder="Cargo">
        <input type="text" id="hotel" placeholder="Hotel">
        <input type="file" id="arquivoExcel" accept=".xlsx">
        <button onclick="processarArquivo()"><span>Gerar Relatório</span></button>
    </div>

    <footer>
        <p>&copy; 2025 AHI | Cluster MG - BHZ. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        function updateDataHora() {
            const data = new Date();
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            const dataHoraFormatada = data.toLocaleString('pt-BR', options);
            document.getElementById('dataHora').textContent = dataHoraFormatada;
        }

        setInterval(updateDataHora, 1000);

        function processarArquivo() {
            const fileInput = document.getElementById('arquivoExcel').files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(sheet);

                const nome = document.getElementById('nome').value;
                const cargo = document.getElementById('cargo').value;
                const hotel = document.getElementById('hotel').value;
                const dataAtual = new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });

                const dadosFiltrados = jsonData.filter(item => item[Object.keys(item)[6]] === hotel);
                gerarDocumento(nome, cargo, hotel, dataAtual, dadosFiltrados);
            };
            reader.readAsArrayBuffer(fileInput);
        }

        function gerarDocumento(nome, cargo, hotel, dataAtual, dados) {
            let docContent = `Nome: ${nome} | ${cargo}\n\nData: ${dataAtual}\n\nFECHAMENTO MENSAL\n\nPrezados, das atividades com maior relevância no mês, destacam-se:\n\nHotel: ${hotel}\n\n`;
            dados.forEach(dado => {
                docContent += `Tipo: ${dado[Object.keys(dado)[0]]}\n`;
                docContent += `Assunto: ${dado[Object.keys(dado)[1]]}\n`;
                docContent += `Conta Relacionada: ${dado[Object.keys(dado)[2]]}\n`;
                docContent += `Data e Hora - início: ${dado[Object.keys(dado)[4]]}\n`;
                docContent += `Data e Hora - Término: ${dado[Object.keys(dado)[5]]}\n`;
                docContent += `Descrição: ${dado[Object.keys(dado)[3]]}\n\n`;
            });
            baixarDocumento(docContent, hotel);
        }

        function baixarDocumento(texto, hotel) {
            const blob = new Blob([texto], { type: "text/plain" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `${hotel}_Fechamento_Mensal.doc`;
            link.click();
        }
    </script>
</body>
</html>
