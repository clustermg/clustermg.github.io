<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Relatório</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1b1f3b;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            background-color: #ff6b00;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }
        input, button {
            margin: 10px;
            padding: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gerador de Relatórios</h1>
        <input type="text" id="nome" placeholder="Seu Nome">
        <input type="text" id="cargo" placeholder="Seu Cargo">
        <input type="text" id="hotel" placeholder="Nome do Hotel">
        <input type="file" id="arquivoExcel" accept=".xlsx">
        <button onclick="processarArquivo()">Gerar Relatório</button>
        <div id="mensagem"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.1/pizzip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.19.0/docxtemplater.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        function processarArquivo() {
            const nome = document.getElementById('nome').value;
            const cargo = document.getElementById('cargo').value;
            const hotel = document.getElementById('hotel').value;
            const fileInput = document.getElementById('arquivoExcel').files[0];

            if (!nome || !cargo || !hotel || !fileInput) {
                document.getElementById('mensagem').innerText = 'Por favor, preencha todos os campos e selecione um arquivo.';
                document.getElementById('mensagem').style.color = 'white';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(sheet);

                const dataAtual = new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });

                // Filtra os dados para o hotel desejado
                const dadosFiltrados = jsonData.filter(item => item[Object.keys(item)[6]] === hotel);
                if (dadosFiltrados.length === 0) {
                    document.getElementById('mensagem').innerText = 'Não foram encontrados dados para o hotel especificado.';
                    document.getElementById('mensagem').style.color = 'red';
                    return;
                }

                // Prepara o conteúdo para o preenchimento no modelo
                const dadosRelatorio = dadosFiltrados.map(dado => ({
                    nome: nome,
                    cargo: cargo,
                    data: dataAtual,
                    hotel: hotel,
                    tipo: dado[Object.keys(dado)[0]],
                    assunto: dado[Object.keys(dado)[1]],
                    conta: dado[Object.keys(dado)[2]],
                    inicio: dado[Object.keys(dado)[4]],
                    termino: dado[Object.keys(dado)[5]],
                    descricao: dado[Object.keys(dado)[3]]
                }));

                gerarDocumento(dadosRelatorio);
            };
            reader.readAsArrayBuffer(fileInput);
        }

        function gerarDocumento(dados) {
            // Carregar o template docx
            fetch('template.docx')  // Caminho para o seu template docx
                .then(response => response.arrayBuffer())
                .then(data => {
                    const zip = new PizZip(data);
                    const doc = new window.docxtemplater(zip);

                    // Preencher os dados no template
                    doc.setData({ items: dados });

                    try {
                        doc.render();
                    } catch (error) {
                        console.log(error);
                        alert("Erro ao gerar o documento.");
                        return;
                    }

                    // Gerar o arquivo docx
                    const out = doc.getZip().generate({ type: 'blob' });

                    // Baixar o arquivo gerado
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(out);
                    link.download = `Relatorio_${dados[0].hotel}_${dados[0].data}.docx`;
                    link.click();
                })
                .catch(error => {
                    alert("Erro ao carregar o modelo.");
                    console.log(error);
                });
        }
    </script>
</body>
</html>
